<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你喜欢我吗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            background-color: #ffd6e0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: "Microsoft YaHei", sans-serif;
            overflow: hidden;
        }
        .title {
            font-size: 26px;
            color: #ff4081;
            margin-bottom: 40px;
            font-weight: bold;
        }
        .btn-wrap {
            position: relative;
        }
        button {
            padding: 14px 30px;
            border: none;
            border-radius: 30px;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        #btn-yes {
            background-color: #ff4081;
            color: #fff;
            z-index: 99;
        }
        #btn-no {
            background: #eeeeee;
            color: #555;
            position: absolute;
            left: 120px;
            top: 0;
        }
        .result {
            margin-top: 40px;
            font-size: 22px;
            color: #ff4081;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>
    <div class="title">你喜欢我吗</div>
    <div class="btn-wrap">
        <button id="btn-yes">喜欢</button>
        <button id="btn-no">不喜欢</button>
    </div>
    <div class="result" id="result-text"></div>

    <script>
        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');
        const resultText = document.getElementById('result-text');

        // 可爱乱跑音效
        const jumpSound = new Audio("https://www.soundjay.com/button/swoop-1.mp3");
        jumpSound.volume = 0.3;

        // 喜欢成功音效
        const loveSound = new Audio("https://www.soundjay.com/button/bell-1.mp3");
        loveSound.volume = 0.3;

        // 不喜欢按钮：乱跑 + 不重叠 + 缩小 + 音效
        btnNo.addEventListener('mouseenter', function(){
            jumpSound.cloneNode(true).play();

            let x, y, ok = false;
            const yesBox = btnYes.getBoundingClientRect();
            const noBox = btnNo.getBoundingClientRect();

            // 循环找不重叠的位置
            while(!ok){
                x = Math.random() * (window.innerWidth - 120);
                y = Math.random() * (window.innerHeight - 120);

                let farX = Math.abs(x - yesBox.left);
                let farY = Math.abs(y - yesBox.top);
                // 距离够远才合格，绝不重叠
                if(farX > 130 || farY > 80){
                    ok = true;
                }
            }

            btnNo.style.left = x + "px";
            btnNo.style.top = y + "px";

            // 越来越小
            let scale = getComputedStyle(btnNo).transform;
            if(scale === "none") scale = 1;
            else {
                let mat = new DOMMatrix(scale);
                scale = mat.a;
            }
            btnNo.style.transform = `scale(${scale * 0.88})`;
        })

        // 点喜欢 弹窗情话+音效
        btnYes.addEventListener('click', function(){
            loveSound.play();
            resultText.innerText = "我也超级喜欢你❤️";
            resultText.style.display = "block";
            document.body.style.background = "#ffc8dd";
        })
    </script>
</body>
</html>
